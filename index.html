<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>獵魔女團：環境淨化戰 v8 Time Attack (Fixed)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Oswald:wght@500;700&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #050014;
            color: white;
            overflow-x: hidden;
            user-select: none;
        }

        .stage-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 100%, #3b0764 0%, #0f172a 40%, #000000 100%);
            z-index: -2;
        }
        
        .laser-beam {
            position: fixed;
            bottom: -10%; left: 50%;
            width: 2px; height: 120vh;
            background: linear-gradient(to top, transparent, #a855f7, transparent);
            transform-origin: bottom;
            animation: sweep 4s infinite ease-in-out alternate;
            z-index: -1;
            opacity: 0.3;
        }

        @keyframes sweep {
            0% { transform: rotate(-30deg); }
            100% { transform: rotate(30deg); }
        }

        /* Glitch Effect for Title */
        .glitch-text {
            text-shadow: 2px 0 #ff00ea, -2px 0 #00ffff;
            animation: glitch 2s infinite linear alternate-reverse;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 0 #ff00ea, -2px 0 #00ffff; }
            50% { text-shadow: -2px 0 #ff00ea, 2px 0 #00ffff; }
            100% { text-shadow: 2px 0 #ff00ea, -2px 0 #00ffff; }
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(168, 85, 247, 0.3);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
        }

        .option-btn {
            transition: all 0.2s ease;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #a855f7; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <!-- Background Effects -->
    <div class="stage-bg"></div>
    <div class="laser-beam"></div>
    <div class="laser-beam" style="animation-delay: -2s; opacity: 0.2;"></div>
    
    <!-- Canvas for Particles -->
    <canvas id="particleCanvas" class="fixed top-0 left-0 w-full h-full pointer-events-none z-50"></canvas>

    <!-- Start Screen -->
    <div id="startScreen" class="glass-panel w-full max-w-2xl rounded-3xl p-8 text-center relative overflow-hidden transition-all duration-500">
        <!-- 加入設定按鈕 -->
        <button onclick="openSettings()" class="absolute top-4 right-4 text-gray-400 hover:text-white transition-colors z-10" title="系統設定">
            <i class="fas fa-cog text-2xl drop-shadow-md hover:rotate-90 transition-transform duration-300"></i>
        </button>
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-pink-500 via-purple-500 to-cyan-500"></div>
        <h1 class="text-4xl md:text-6xl font-black mb-4 tracking-wider uppercase font-['Oswald'] glitch-text">
            環境淨化戰
        </h1>
        <p class="text-purple-300 mb-8 text-lg md:text-xl">Time Attack Mode v8</p>
        
        <div class="bg-black/50 rounded-xl p-6 mb-8 text-left border border-purple-500/30">
            <h3 class="text-xl font-bold text-pink-400 mb-3"><i class="fas fa-scroll mr-2"></i>任務規則</h3>
            <ul class="space-y-2 text-gray-300">
                <li><i class="fas fa-check-circle text-green-400 mr-2"></i>初始擁有 <span class="text-white font-bold">300 秒 (5 分鐘)</span> 淨化時間。</li>
                <li><i class="fas fa-bolt text-yellow-400 mr-2"></i>答對一題可獲得 <span class="text-white font-bold">100 分</span>，無時間獎勵。</li>
                <li><i class="fas fa-times-circle text-red-400 mr-2"></i>答錯將 <span class="text-red-400 font-bold">扣除 5 秒</span>，請謹慎選擇！</li>
                <li><i class="fas fa-stopwatch text-cyan-400 mr-2"></i>時間歸零即終止任務，挑戰最高極限！</li>
            </ul>
        </div>

        <button id="startBtn" onclick="initGame()" class="group relative px-8 py-4 bg-purple-600 hover:bg-purple-500 text-white font-bold rounded-xl text-xl transition-all w-full overflow-hidden">
            <div class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
            <span id="startBtnText"><i class="fas fa-play mr-2"></i>START MISSION</span>
        </button>
    </div>

    <!-- Game Screen -->
    <div id="gameScreen" class="glass-panel w-full max-w-3xl rounded-3xl p-6 md:p-8 hidden relative flex-col">
        <!-- Header: Stats -->
        <div class="flex justify-between items-center mb-6 pb-4 border-b border-purple-500/30">
            <div class="flex items-center space-x-3">
                <div class="bg-purple-900/50 px-4 py-2 rounded-lg border border-purple-500/30">
                    <span class="text-purple-300 text-sm block">SCORE</span>
                    <span id="scoreDisplay" class="text-2xl font-black font-['Oswald'] text-pink-400">0</span>
                </div>
                <div class="bg-purple-900/50 px-4 py-2 rounded-lg border border-purple-500/30">
                    <span class="text-purple-300 text-sm block">STAGE</span>
                    <span id="stageDisplay" class="text-2xl font-black font-['Oswald'] text-cyan-400">1</span>
                </div>
            </div>
            
            <div class="text-right">
                <span class="text-purple-300 text-sm block">TIME LEFT</span>
                <div class="text-4xl md:text-5xl font-black font-['Oswald'] text-white tracking-wider" id="timeDisplay">
                    300.0
                </div>
            </div>
        </div>

        <!-- Question Section -->
        <div class="min-h-[120px] flex items-center justify-center mb-8 relative">
            <h2 id="questionText" class="text-2xl md:text-3xl font-bold text-center leading-relaxed drop-shadow-lg">
                載入中...
            </h2>
            <!-- Feedback Overlay -->
            <div id="feedbackOverlay" class="absolute inset-0 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 text-6xl drop-shadow-[0_0_15px_rgba(0,0,0,0.8)]">
                <!-- Icon injected here -->
            </div>
        </div>

        <!-- Options Grid -->
        <div id="optionsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Options will be generated here -->
        </div>
    </div>

    <!-- End Screen -->
    <div id="endScreen" class="glass-panel w-full max-w-2xl rounded-3xl p-8 text-center hidden relative">
        <h1 class="text-5xl font-black mb-2 tracking-wider uppercase font-['Oswald'] text-red-500 glitch-text">
            MISSION OVER
        </h1>
        <p class="text-purple-300 mb-8 text-xl">淨化時間結束</p>

        <div class="bg-black/60 rounded-2xl p-8 mb-8 border border-purple-500/50 inline-block w-full max-w-md mx-auto">
            <p class="text-gray-400 text-sm mb-1">FINAL SCORE</p>
            <p id="finalScore" class="text-6xl font-black text-pink-400 font-['Oswald'] drop-shadow-[0_0_10px_rgba(236,72,153,0.8)]">0</p>
            <div class="mt-4 pt-4 border-t border-purple-500/30 flex justify-around text-sm">
                <div>
                    <p class="text-gray-400">答對題數</p>
                    <p id="correctCount" class="text-2xl font-bold text-green-400">0</p>
                </div>
                <div>
                    <p class="text-gray-400">到達關卡</p>
                    <p id="finalStage" class="text-2xl font-bold text-cyan-400">0</p>
                </div>
            </div>
        </div>

        <button onclick="resetGame()" class="px-8 py-4 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-xl text-xl transition-all w-full shadow-[0_0_15px_rgba(8,145,178,0.5)]">
            <i class="fas fa-redo mr-2"></i>重新挑戰
        </button>
    </div>

    <!-- Settings Modal (設定後台) -->
    <div id="settingsModal" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="glass-panel w-full max-w-md rounded-2xl p-6 relative border border-purple-500/50 shadow-[0_0_30px_rgba(168,85,247,0.3)]">
            <h2 class="text-2xl font-bold text-pink-400 mb-4 text-left"><i class="fas fa-server mr-2"></i>系統設定後台</h2>
            <div class="space-y-4 text-left">
                <div>
                    <label class="block text-purple-300 text-sm mb-2 font-bold"><i class="fas fa-link mr-1"></i>題庫 API 網址 (如 Google Sheets)</label>
                    <input type="text" id="apiUrlInput" class="w-full bg-black/50 border border-purple-500/50 rounded-lg p-3 text-white focus:outline-none focus:border-pink-500 transition-colors" placeholder="請輸入 API URL...">
                    <p class="text-xs text-gray-400 mt-2">若留空或連線讀取失敗，系統將自動無縫套用內建備用題庫。</p>
                </div>
            </div>
            <div class="flex justify-end space-x-3 mt-6">
                <button onclick="closeSettings()" class="px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 transition-colors font-bold text-white">取消</button>
                <button onclick="saveSettings()" class="px-4 py-2 rounded-lg bg-purple-600 hover:bg-purple-500 transition-colors font-bold text-white shadow-[0_0_10px_rgba(168,85,247,0.4)]">儲存設定</button>
            </div>
        </div>
    </div>

    <script>
        // --- Canvas Particle System ---
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 5 + 2;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0;
                this.decay = Math.random() * 0.02 + 0.015;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function spawnParticles(element, isCorrect) {
            const rect = element.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            const colors = isCorrect ? ['#4ade80', '#22c55e', '#a855f7'] : ['#f87171', '#ef4444', '#fbbf24']; 
            
            for (let i = 0; i < 30; i++) {
                particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)]));
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.update();
                p.draw();
                if (p.life <= 0) particles.splice(index, 1);
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // --- Game Logic ---
        // Fallback Question Bank
        const fallbackQuestions = [
            { q: "水質優氧化主要是因為水中哪種物質過多？", opts: ["氮、磷", "氧氣", "重金屬", "氯氣"], ans: 0 },
            { q: "以下哪一種屬於再生能源？", opts: ["天然氣", "太陽能", "煤炭", "核能"], ans: 1 },
            { q: "PM2.5 是指直徑小於或等於多少微米的懸浮微粒？", opts: ["25", "2.5", "0.25", "250"], ans: 1 },
            { q: "溫室效應氣體中，人類活動排放量最大的是？", opts: ["甲烷", "二氧化碳", "氧化亞氮", "氟氯碳化物"], ans: 1 },
            { q: "垃圾分類中，廢電池應歸類為？", opts: ["一般垃圾", "資源回收", "有害垃圾", "廚餘"], ans: 2 }
        ];

        let questions = [];
        let currentStage = 0;
        let score = 0;
        let correctAnswers = 0;
        let timeLeft = 300.0;
        let timerInterval = null;
        let transitionTimeout = null; // Fix 2: To control the timeout between questions

        // DOM Elements
        const screens = {
            start: document.getElementById('startScreen'),
            game: document.getElementById('gameScreen'),
            end: document.getElementById('endScreen')
        };
        const displays = {
            score: document.getElementById('scoreDisplay'),
            stage: document.getElementById('stageDisplay'),
            time: document.getElementById('timeDisplay'),
            question: document.getElementById('questionText'),
            options: document.getElementById('optionsContainer'),
            feedback: document.getElementById('feedbackOverlay')
        };
        const startBtn = document.getElementById('startBtn');
        const startBtnText = document.getElementById('startBtnText');

        // --- Settings Modal Logic ---
        function openSettings() {
            const modal = document.getElementById('settingsModal');
            const input = document.getElementById('apiUrlInput');
            input.value = localStorage.getItem('game_api_url') || '';
            modal.classList.remove('hidden');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.add('hidden');
        }

        function saveSettings() {
            const url = document.getElementById('apiUrlInput').value.trim();
            localStorage.setItem('game_api_url', url);
            closeSettings();
            
            // 儲存成功小提示
            const notif = document.createElement('div');
            notif.className = "fixed top-10 left-1/2 -translate-x-1/2 bg-green-500/90 text-white px-6 py-3 rounded-full font-bold shadow-[0_0_15px_rgba(34,197,94,0.5)] z-[200] animate-bounce";
            notif.innerHTML = '<i class="fas fa-check-circle mr-2"></i>設定已儲存，下次啟動生效';
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2500);
        }

        function switchScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.add('hidden'));
            screens[screenName].classList.remove('hidden');
            if (screenName === 'game') screens.game.style.display = 'flex';
            else screens.game.style.display = 'none';
        }

        // Fetch Questions (Simulated or Real API logic can be placed here)
        async function fetchQuestions() {
            const apiUrl = localStorage.getItem('game_api_url');
            
            // 如果有設定 API，嘗試非同步抓取
            if (apiUrl && apiUrl.trim() !== '') {
                try {
                    const response = await fetch(apiUrl);
                    const data = await response.json();
                    
                    // 確保回傳格式正確 (支援直接陣列 [] 或 { data: [] } 格式)
                    let parsedQuestions = Array.isArray(data) ? data : (data.data || []);
                    
                    if (parsedQuestions.length > 0 && parsedQuestions[0].q) {
                        console.log("成功從 API 載入外部題庫！");
                        // 打亂題庫順序後回傳
                        return parsedQuestions.sort(() => Math.random() - 0.5);
                    } else {
                        console.warn("API 回傳格式不符預期，啟用備用題庫", data);
                    }
                } catch (err) {
                    console.warn("API 題庫載入失敗 (網路或 CORS 錯誤)，啟用備用題庫", err);
                }
            } else {
                console.log("未設定 API 網址，使用內建備用題庫。");
            }
            
            // 失敗或未設定時的最終備案
            return [...fallbackQuestions].sort(() => Math.random() - 0.5);
        }

        async function initGame() {
            // Fix 1: Prevent multiple clicks overlapping timers
            if (startBtn.disabled) return; 
            startBtn.disabled = true;
            startBtnText.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>載入中...';
            startBtn.classList.replace('bg-purple-600', 'bg-gray-600');

            try {
                // Fetch and prepare data
                questions = await fetchQuestions();
                
                // Reset stats
                currentStage = 0;
                score = 0;
                correctAnswers = 0;
                timeLeft = 300.0;
                
                updateUI();
                switchScreen('game');
                loadQuestion();
                
                // Fix 1: Ensure timer is cleared before starting a new one
                clearInterval(timerInterval);
                timerInterval = setInterval(updateTimer, 100);

            } catch (error) {
                console.error("載入題庫失敗:", error);
                alert("網路異常，請重試！");
                startBtn.disabled = false;
                startBtnText.innerHTML = '<i class="fas fa-play mr-2"></i>START MISSION';
                startBtn.classList.replace('bg-gray-600', 'bg-purple-600');
            }
        }

        function updateTimer() {
            timeLeft -= 0.1;
            if (timeLeft <= 0) {
                timeLeft = 0;
                displays.time.textContent = "0.0";
                endGame();
            } else {
                displays.time.textContent = timeLeft.toFixed(1);
                // Turn red if less than 10 seconds
                if (timeLeft <= 10) {
                    displays.time.classList.add('text-red-500');
                    displays.time.classList.remove('text-white');
                } else {
                    displays.time.classList.remove('text-red-500');
                    displays.time.classList.add('text-white');
                }
            }
        }

        function updateUI() {
            displays.score.textContent = score;
            displays.stage.textContent = currentStage + 1;
            displays.time.textContent = timeLeft.toFixed(1);
        }

        function loadQuestion() {
            displays.feedback.style.opacity = '0';
            displays.options.innerHTML = '';
            
            // Generate infinite loop of questions if we run out
            const qIndex = currentStage % questions.length;
            const currentQ = questions[qIndex];
            
            // Fix 4: Use textContent for XSS protection
            displays.question.textContent = currentQ.q;

            currentQ.opts.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full p-4 rounded-xl border border-purple-500/50 bg-black/40 text-left text-lg md:text-xl font-bold hover:bg-purple-900/50 hover:border-purple-400 hover:shadow-[0_0_15px_rgba(168,85,247,0.4)]';
                // Fix 4: Use textContent instead of innerHTML
                btn.textContent = opt; 
                btn.onclick = () => handleAnswer(index === currentQ.ans, btn);
                displays.options.appendChild(btn);
            });
        }

        function handleAnswer(isCorrect, selectedBtn) {
            // Fix 3: Remove hover states and disable all buttons to prevent ghosting/double clicks
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(btn => {
                btn.disabled = true;
                btn.classList.remove('hover:bg-purple-900/50', 'hover:border-purple-400', 'hover:shadow-[0_0_15px_rgba(168,85,247,0.4)]');
                if (btn !== selectedBtn) btn.style.opacity = '0.5';
            });

            spawnParticles(selectedBtn, isCorrect);

            if (isCorrect) {
                score += 100;
                correctAnswers++;
                selectedBtn.classList.add('bg-green-600/80', 'border-green-400');
                displays.feedback.innerHTML = '<i class="fas fa-check text-green-400"></i>';
            } else {
                timeLeft -= 5; // Penalty
                selectedBtn.classList.add('bg-red-600/80', 'border-red-400');
                displays.feedback.innerHTML = '<i class="fas fa-times text-red-500"></i>';
                
                // Show floating penalty text
                const penalty = document.createElement('div');
                penalty.textContent = "-5s";
                penalty.className = "absolute text-red-500 font-black text-4xl animate-[ping_1s_forwards] pointer-events-none";
                penalty.style.left = '50%';
                penalty.style.top = '10%';
                penalty.style.transform = 'translate(-50%, -50%)';
                screens.game.appendChild(penalty);
                setTimeout(() => penalty.remove(), 1000);

                // Fix 2: Immediately stop if penalty drops time <= 0
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    displays.time.textContent = "0.0";
                    endGame();
                    return; // Prevent triggering the next question timeout
                }
            }

            updateUI();
            displays.feedback.style.opacity = '1';
            
            // Clear any existing transition timeout before setting a new one
            clearTimeout(transitionTimeout);
            transitionTimeout = setTimeout(() => {
                currentStage++;
                loadQuestion();
            }, 800);
        }

        function endGame() {
            clearInterval(timerInterval);
            clearTimeout(transitionTimeout); // Clear transition to prevent next question rendering in background
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('correctCount').textContent = correctAnswers;
            document.getElementById('finalStage').textContent = currentStage + 1;
            
            switchScreen('end');
        }

        function resetGame() {
            startBtn.disabled = false;
            startBtnText.innerHTML = '<i class="fas fa-play mr-2"></i>START MISSION';
            startBtn.classList.replace('bg-gray-600', 'bg-purple-600');
            displays.time.classList.remove('text-red-500');
            displays.time.classList.add('text-white');
            switchScreen('start');
        }
    </script>
</body>
</html>
